<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
    <strong>Microslopify</strong>
    <h5>Extension for Safari</h5>
    </header>
    
    <hr>

    <main>
        <div class="inputs">
            <label>
                <input type="checkbox" id="microslop">
                Microsoft → Microslop
            </label>
            
            <label>
                <input type="checkbox" id="slopya">
                Satya Nadella → Slopya Nuttela
            </label>

            <label>
                <input type="checkbox" id="slopilot">
                Copilot → Slopilot
            </label>

            <label>
                <input type="checkbox" id="sloffice">
                Microsoft Office → Microslop Sloffice
            </label>
        </div>
    </main>

    <hr>

    <footer>
        Inspired by <a href="https://github.com/4O4-wasd/Microslop">Microslop Extension</a>
    </footer>
    
    <script src="popup.js"></script>
</body>
</html>
